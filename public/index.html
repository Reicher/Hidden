<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hidden</title>
    <link rel="icon" type="image/svg+xml" href="/assets/hidden-face.svg" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="overlay-active">
    <canvas id="game"></canvas>

    <div id="screenRoot">
      <section id="connectView" class="view">
        <div class="card">
          <h1>Hidden</h1>
          <p id="roomInfo" class="room-info"></p>
          <label for="nameInput">Namn</label>
          <input id="nameInput" type="text" placeholder="Ditt namn" maxlength="20" autocomplete="off" />
          <button id="connectBtn" type="button">Anslut</button>
          <div id="connectError" class="error" aria-live="polite"></div>
          <button id="createPrivateRoomBtn" class="hidden" type="button">Skapa privat rum</button>
        </div>
      </section>

      <section id="lobbyView" class="view hidden">
        <div id="scoreboardBar">
          <table id="scoreTable">
            <thead>
              <tr>
                <th>Namn</th>
                <th>BR-vinster</th>
                <th>Kills</th>
                <th>Deaths</th>
                <th>Oskyldiga</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="scoreBody"></tbody>
          </table>
        </div>

        <div id="lobbyMain">
          <div id="chatPanel">
            <div id="chatMessages"></div>
            <div id="chatInputRow">
              <input id="chatInput" type="text" placeholder="Skriv i chatten..." maxlength="220" autocomplete="off" />
              <button id="chatSendBtn" type="button">Skicka</button>
            </div>
          </div>
          <div id="lobbyActionRow">
            <button id="playBtn" type="button">Ready</button>
            <button id="lobbySettingsBtn" type="button">Settings</button>
          </div>
          <div id="lobbyMatchStatus" class="hidden" aria-live="polite">
            <span id="lobbyMatchStatusTitle">Match pågår</span>
            <span id="lobbyMatchStatusPlayers">Spelare kvar: 0</span>
            <span id="lobbyMatchStatusTime">Tid: 00:00</span>
          </div>

          <div id="lobbyDialogBackdrop" class="hidden">
            <div id="lobbyDialogCard" role="dialog" aria-modal="true" aria-labelledby="lobbyDialogTitle">
              <h2 id="lobbyDialogTitle"></h2>
              <p id="lobbyDialogText"></p>
              <div id="settingsPanel" class="hidden">
                <p id="settingsIntro">Styr om mobilkontroller ska visas i match.</p>
                <div id="settingsMobileControlsRow">
                  <span>Mobilkontroller</span>
                  <button id="mobileControlsModeBtn" type="button">Auto</button>
                </div>
                <p id="mobileControlsModeHelp">Auto: visas bara när enheten identifieras som touch.</p>
              </div>
              <button id="lobbyDialogCloseBtn" type="button">Stäng</button>
            </div>
          </div>
        </div>
        <div id="lobbyMenuBackdrop" class="hidden">
          <div id="lobbyMenuCard" role="dialog" aria-modal="true" aria-labelledby="lobbyMenuTitle">
            <h2 id="lobbyMenuTitle">Settings</h2>
            <button id="lobbyMenuControlsBtn" type="button">Kontroller</button>
            <button id="lobbyMenuSettingsBtn" type="button">Inställningar</button>
            <button id="lobbyMenuCreditsBtn" type="button">Credits</button>
            <button id="lobbyMenuCloseBtn" type="button">Stäng</button>
          </div>
        </div>
      </section>
    </div>
    <div id="countdownOverlay" class="hidden" aria-live="polite">
      <div id="countdownText"></div>
    </div>

    <div id="gameHud" class="hidden" aria-live="polite">
      <div id="aliveOthersText">0 andra spelar just nu</div>
      <div id="gameChatNotice">Systemhändelser</div>
      <button id="gameMenuBtn" type="button" aria-label="Spelmeny">⚙</button>
      <div id="gameChatBox">
        <div id="gameChatMessages"></div>
        <div id="gameChatInputRow" class="hidden">
          <input id="gameChatInput" type="text" placeholder="Skriv meddelande..." maxlength="220" autocomplete="off" />
        </div>
      </div>
      <div id="gameMenuBackdrop" class="hidden">
        <div id="gameMenuCard" role="dialog" aria-modal="true" aria-labelledby="gameMenuTitle">
          <h2 id="gameMenuTitle">Spelmeny</h2>
          <button id="gameMenuControlsBtn" type="button">Kontroller</button>
          <button id="gameMenuResumeBtn" type="button">Fortsätt spela</button>
          <button id="gameMenuLobbyBtn" type="button">Återgå till lobby</button>
          <button id="gameMenuLeaveBtn" type="button">Lämna spelet</button>
        </div>
      </div>
      <div id="gameInfoBackdrop" class="hidden">
        <div id="gameInfoCard" role="dialog" aria-modal="true" aria-labelledby="gameInfoTitle">
          <h2 id="gameInfoTitle"></h2>
          <p id="gameInfoText"></p>
          <button id="gameInfoCloseBtn" type="button">Stäng</button>
        </div>
      </div>
      <div id="mobileControls" class="hidden" aria-hidden="true">
        <div id="mobileJoystickWrap">
          <div id="mobileJoystickBase">
            <div id="mobileJoystickKnob"></div>
          </div>
        </div>
        <div id="mobileCombatPad">
          <button id="mobileSprintBtn" type="button">Spring</button>
          <button id="mobileAttackBtn" type="button">Attack</button>
        </div>
        <div id="mobileActionPad">
          <div id="mobileLookPad">Dra här för att titta</div>
        </div>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
